    <div class="text-center mb-8">

      <div class="flex items-center gap-3">

        <div><div class="font-bold text-gray-800 text-sm">目的別診断</div><div class="text-orange-600 text-sm">ダイエット・筋トレ・健康維持など</div></div>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-2xl">💰</div>
        <div><div class="font-bold text-gray-800 text-sm">予算別おすすめ</div><div class="text-gray-600 text-sm">月5,000円〜30,000円の選択肢を比較</div></div>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-2xl">🏋️</div>
        <div><div class="font-bold text-gray-800 text-sm">ジムタイプ解説</div><div class="text-gray-600 text-sm">パーソナル・24時間・フィットネスクラブ等</div></div>

    <div class="mb-6">
      <div class="flex justify-between text-xs text-gray-500 mb-1">
        <span id="q-label">質問 1 / 5</span>
        <span id="q-pct">20%</span>
      </div>
      <div class="progress-track"><div class="progress-bar" id="prog" style="width:20%"></div></div>
    </div>
    <div class="card p-6">
      <h2 class="text-lg font-bold text-gray-800 mb-5" id="q-text"></h2>
      <div id="opts"></div>
    </div>
  </div>

  <div id="screen-loading" class="screen text-center py-20">
    <div class="text-5xl mb-4">💪</div>
    <div class="text-gray-700 font-bold text-lg mb-2">診断中...</div>
    <div class="text-gray-500 text-sm">最適なジムタイプを分析しています</div>
  </div>

    <div class="text-center mb-6">

    </div>

      <div class="text-center mb-4">
        <div class="text-3xl mb-2" id="res-emoji">🏋️</div>

        <div class="text-sm text-gray-500 mt-1" id="res-cost"></div>
      </div>
      <p class="text-sm text-gray-600 mb-3" id="res-desc"></p>
      <div class="bg-orange-50 rounded-lg p-3 text-sm text-gray-700" id="res-merit"></div>
    </div>
    <div class="card p-6 mb-4">
      <h3 class="font-bold text-gray-800 mb-3">🎯 おすすめサービス</h3>
      <div id="affiliate-area"></div>
    </div>
    <button class="btn-primary" style="background:#6b7280;" onclick="restart()">もう一度診断する</button>
  </div>

</div>

<script>
var Qs = [
  { text:"運動の主な目的は？", opts:["ダイエット・体型改善","筋肉をつけたい（筋トレ）","健康維持・体力づくり","競技力向上・スポーツ上達"], key:"goal" },
  { text:"現在の運動経験は？", opts:["ほぼ未経験（これから始める）","少し経験あり","ある程度継続してきた","かなり経験がある"], key:"exp" },
  { text:"月額予算は？", opts:["〜5,000円","5,000〜15,000円","15,000〜30,000円","30,000円以上"], key:"budget" },
  { text:"週に通える頻度は？", opts:["週1回","週2〜3回","週4回以上","毎日でも通いたい"], key:"freq" },
  { text:"最も重視することは？", opts:["コスパ（安く続ける）","トレーナーのサポート","設備・マシンの充実","場所・時間の便利さ"], key:"priority" }
];

var gymTypes = {
  personal: { emoji:"🏋️", type:"パーソナルジム", cost:"月15,000〜50,000円", desc:"専任トレーナーが1対1でサポート。短期間での体型変化を求める方に最適。", merit:"✅ 食事指導付き\n✅ モチベーション管理\n✅ 効率的なトレーニング" },
  fitclub: { emoji:"🏊", type:"フィットネスクラブ", cost:"月7,000〜15,000円", desc:"プール・スタジオ・マシン室が充実した総合型ジム。多彩なプログラムを楽しめます。", merit:"✅ プール・スタジオあり\n✅ 充実した設備\n✅ グループレッスン" },
  twentyfour: { emoji:"⏰", type:"24時間ジム", cost:"月3,000〜8,000円", desc:"365日24時間いつでも使えるコスパ重視のジム。セルフトレーニング派に最適。", merit:"✅ 低コスト\n✅ 空いている時間に通える\n✅ マシン中心" },
  sports: { emoji:"🏃", type:"スポーツ特化型（コナミ・ルネサンス等）", cost:"月8,000〜12,000円", desc:"水泳・テニスなどスポーツ施設を備えた総合型。競技力向上にも対応。", merit:"✅ スポーツ施設充実\n✅ コーチプログラムあり\n✅ 家族でも利用可" }
};

var cur=0,ans={};

function startDiagnosis() { show('questions'); renderQ(); }

function show(name) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-'+name).classList.add('active');
}

function renderQ() {
  var q=Qs[cur];
  var pct=Math.round((cur+1)/Qs.length*100);
  document.getElementById('q-label').textContent='質問 '+(cur+1)+' / '+Qs.length;
  document.getElementById('q-pct').textContent=pct+'%';
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('q-text').textContent=q.text;
  var c=document.getElementById('opts'); c.innerHTML='';
  q.opts.forEach(function(opt,i){
    var b=document.createElement('button');
    b.className='option-btn'; b.textContent=opt;
    b.onclick=function(){ pick(i,opt,q.key); };
    c.appendChild(b);
  });
}

function pick(i,val,key) {
  ans[key]={i:i,val:val};
  document.querySelectorAll('.option-btn').forEach(function(b,j){ b.classList.toggle('selected',j===i); });
  setTimeout(function(){
    cur++;
    if(cur<Qs.length){ renderQ(); } else { show('loading'); setTimeout(showResults,1600); }
  },300);
}

function showResults() {
  var goalIdx=ans.goal?ans.goal.i:0;
  var budgetIdx=ans.budget?ans.budget.i:1;
  var priorityIdx=ans.priority?ans.priority.i:0;

  var gymKey;
  if(priorityIdx===1 || (goalIdx===0 && budgetIdx>=2)) { gymKey='personal'; }
  else if(budgetIdx===0 || priorityIdx===0) { gymKey='twentyfour'; }
  else if(goalIdx===3) { gymKey='sports'; }
  else { gymKey='fitclub'; }

  var gym=gymTypes[gymKey];
  document.getElementById('res-emoji').textContent=gym.emoji;
  document.getElementById('res-type').textContent=gym.type;
  document.getElementById('res-cost').textContent=gym.cost;
  document.getElementById('res-desc').textContent=gym.desc;
  document.getElementById('res-merit').innerHTML=gym.merit.replace(/\n/g,'<br>');

  var affArea=document.getElementById('affiliate-area');
  if(gymKey==='personal') {
    affArea.innerHTML='<div class="bg-orange-50 border border-orange-200 rounded-xl p-4 mb-2"><div class="font-bold text-orange-800 mb-1">パーソナルジムの無料体験を予約</div><p class="text-xs text-gray-600 mb-3">初回無料カウンセリング実施中。プロトレーナーが食事・運動を徹底サポート。</p><a href="A8_PERSONAL_GYM_URL_PLACEHOLDER" target="_blank" rel="noopener sponsored" class="block text-center bg-orange-500 text-white font-bold py-3 rounded-lg text-sm hover:bg-orange-600 transition">無料体験を予約する →</a></div>';
  } else {
    affArea.innerHTML='<div class="bg-orange-50 border border-orange-200 rounded-xl p-4 mb-2"><div class="font-bold text-orange-800 mb-1">近くのジムを探す・入会する</div><p class="text-xs text-gray-600 mb-3">エリア・予算・目的から最適なジムを検索。入会金無料キャンペーンも多数。</p><a href="A8_GYM_URL_PLACEHOLDER" target="_blank" rel="noopener sponsored" class="block text-center bg-orange-500 text-white font-bold py-3 rounded-lg text-sm hover:bg-orange-600 transition">近くのジムを探す →</a></div>';
  }
  show('results');
}

function restart() { cur=0; ans={}; show('intro'); }
</script>
